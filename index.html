<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaiser Benefit Resource Guide — Farther</title>
<style>
:root {
  --ink: #10243F;
  --cream: #F7F4E9;
  --gold: #C08A2D;
  --blue: #1E55C0;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: Georgia, 'Times New Roman', serif;
  background: linear-gradient(135deg, var(--cream) 0%, #faf7f0 100%);
  color: var(--ink);
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  max-width: 600px;
  background: white;
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(16, 36, 63, 0.12);
  padding: 60px 40px;
  text-align: center;
}

.logo {
  font-size: 28px;
  font-weight: bold;
  color: var(--ink);
  margin-bottom: 8px;
  font-family: Georgia, serif;
  letter-spacing: -0.5px;
}

.tagline {
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 32px;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  font-weight: 600;
}

h1 {
  font-size: 38px;
  line-height: 1.2;
  margin-bottom: 16px;
  font-weight: normal;
  letter-spacing: -0.3px;
}

.description {
  font-size: 16px;
  color: #666;
  margin-bottom: 40px;
  line-height: 1.7;
}

.cta-button {
  display: inline-block;
  padding: 14px 32px;
  background: var(--blue);
  color: white;
  text-decoration: none;
  border-radius: 6px;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.5px;
  transition: background 0.3s ease;
  margin-bottom: 20px;
  display: inline-block;
}

.cta-button:hover {
  background: #164fa2;
}

.secondary-link {
  display: block;
  margin-top: 24px;
  font-size: 14px;
}

.secondary-link a {
  color: var(--blue);
  text-decoration: none;
}

.secondary-link a:hover {
  text-decoration: underline;
}

.footnote {
  font-size: 12px;
  color: #999;
  margin-top: 40px;
  padding-top: 24px;
  border-top: 1px solid #eee;
  font-family: 'Helvetica Neue', Arial, sans-serif;
}

@media (max-width: 600px) {
  .container {
    padding: 40px 24px;
  }

  h1 {
    font-size: 28px;
  }

  .logo {
    font-size: 24px;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="logo">Farther</div>
  <div class="tagline">Kaiser Focus Team</div>

  <h1>Kaiser Permanente Retirement Benefits Guide</h1>

  <p class="description">
    A comprehensive reference guide for wealth advisors covering Kaiser retirement plans,
    eligibility, benefits calculation, and more.
  </p>

  <a href="Kaiser_Retirement_Benefits_Guide.html" class="cta-button">
    Open the Guide
  </a>

  <div class="secondary-link">
    <p>Other resources:</p>
    <a href="https://jamescanode-alt.github.io/ATT-Benefit-Resource-Guide/">AT&T Benefit Resource Guide</a>
  </div>

  <p class="footnote">
    Last updated: July 2026
  </p>
</div>

</body>
</html>
